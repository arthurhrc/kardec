name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Floor below which the test job fails. Current actual coverage is
# tracked in CHANGELOG; the gate stays at the floor so a regression
# is what trips it, not "didn't improve". Tighten in increments.
env:
  COVERAGE_FLOOR: '60'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Force bash on Windows so the awk-based coverage gate and
        # the go-mod-tidy diff run identically across the matrix.
        # GitHub-hosted Windows runners ship Git Bash by default.
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod tidy (verify clean)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

      - name: coverage gate
        # Coverage is identical across OSes (same source, same
        # Go); gate on the Linux run only to keep the matrix
        # output clean and avoid duplicated "below floor" errors
        # if a platform-specific test path skews the number.
        if: matrix.os == 'ubuntu-latest'
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "total coverage: $total%"
          if awk -v t="$total" -v f="$COVERAGE_FLOOR" 'BEGIN { exit !(t < f) }'; then
            echo "::error ::coverage $total% is below floor $COVERAGE_FLOOR%"
            exit 1
          fi

      - name: upload coverage profile
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Direct linters instead of golangci-lint: published
      # golangci-lint binaries (v1.64.x and v2.1.x) are built with
      # Go 1.24 and either refuse to lint a 1.26.x go.mod or panic
      # in the type checker on third-party deps. Direct staticcheck
      # builds with the runner's Go (1.26.x) and side-steps the
      # ecosystem mismatch. govet runs in the test job.
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: ineffassign
        run: |
          go install github.com/gordonklaus/ineffassign@latest
          ineffassign ./...
      - name: misspell
        run: |
          go install github.com/client9/misspell/cmd/misspell@latest
          misspell -error .

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build all examples
        run: |
          for dir in examples/*/; do
            echo "building $dir"
            go build -o /dev/null ./$dir
          done
