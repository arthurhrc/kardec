# golangci-lint configuration (v2 schema). Conservative linter set
# — every linter that runs in CI must produce a clean output, so
# adding one means committing to fixing every existing finding it
# surfaces.
#
# To run locally:
#
#   golangci-lint run ./...

version: "2"

run:
  timeout: 3m
  tests: true
  # Override the language target so the published binary (built
  # with Go 1.24 even in v2.1.x) doesn't refuse to lint a 1.26.x
  # go.mod target. None of the enabled linters depend on language-
  # version heuristics that this would invalidate.
  go: "1.24"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteString
        - (*bytes.Buffer).WriteByte
        - (*strings.Builder).Write
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteByte
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    paths:
      # Sample sources / examples are kept ergonomic over strictly
      # idiomatic so readers see the API at its most legible.
      - examples
    rules:
      - path: _test\.go
        linters:
          - errcheck
